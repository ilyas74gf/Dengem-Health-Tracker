name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1 # <--- Eksik olan ve hata veren analiz paketini buraya ekledik!
  flutter_launcher_icons: ^0.13.1 # Logoyu otomatik boyutlandırmak için bu paketi ekledik

flutter_launcher_icons:
